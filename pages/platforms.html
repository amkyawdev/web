<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platforms - Aung Myo Kyaw</title>
    <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/platforms.css">
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    
    <!-- Menu Button -->
    <div class="menu-btn" id="menuBtn">
        <span></span>
        <span></span>
        <span></span>
    </div>
    
    <!-- Side Menu -->
    <div class="side-menu" id="sideMenu">
        <div class="side-menu-header">
            <i class="fas fa-code" style="font-size: 40px; color: white;"></i>
            <h3>Aung Myo Kyaw</h3>
            <p>Developer Platforms</p>
        </div>
        <ul class="side-menu-items">
            <li><a href="home.html"><i class="fas fa-home"></i> Home</a></li>
            <li><a href="platforms.html"><i class="fas fa-layer-group"></i> Platforms</a></li>
            <li><a href="projects.html"><i class="fas fa-project-diagram"></i> Projects</a></li>
            <li><a href="chat.html"><i class="fas fa-comments"></i> Chat</a></li>
            <li><a href="docs.html"><i class="fas fa-book"></i> Docs</a></li>
            <li><a href="connect.html"><i class="fas fa-address-card"></i> Connect</a></li>
            <li><a href="admin.html"><i class="fas fa-user-shield"></i> Admin</a></li>
            <li class="auth-link-item login-link"><a href="../auth/login.html"><i class="fas fa-sign-in-alt"></i> Login</a></li>
            <li class="auth-link-item register-link"><a href="../auth/register.html"><i class="fas fa-user-plus"></i> Register</a></li>
            <li class="auth-link-item logout-link" style="display: none;"><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
        <div id="userInfo"></div>
    </div>
    
    <div class="menu-overlay" id="menuOverlay"></div>
    
    <div class="main-content">
        <div class="container">
            <div class="platforms-header">
                <h1 class="page-title">
                    <i class="fas fa-layer-group"></i> 
                    Development Platforms
                </h1>
                <p class="page-subtitle">
                    Explore cutting-edge platforms for modern development
                </p>
            </div>
            
            <!-- Search -->
            <div class="search-section">
                <div class="search-wrapper">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="platformSearch" placeholder="Search platforms..." class="search-input">
                </div>
            </div>
            
            <!-- Category Filters -->
            <div class="category-filters">
                <button class="category-btn active" data-category="all" onclick="filterByCategory('all')">
                    <i class="fas fa-th-large"></i> All
                    <span class="filter-count" id="count-all">0</span>
                </button>
                <button class="category-btn" data-category="ai" onclick="filterByCategory('ai')">
                    <i class="fas fa-brain"></i> AI & ML
                    <span class="filter-count" id="count-ai">0</span>
                </button>
                <button class="category-btn" data-category="coding" onclick="filterByCategory('coding')">
                    <i class="fas fa-code"></i> Coding
                    <span class="filter-count" id="count-coding">0</span>
                </button>
                <button class="category-btn" data-category="mobile" onclick="filterByCategory('mobile')">
                    <i class="fas fa-mobile-alt"></i> Mobile
                    <span class="filter-count" id="count-mobile">0</span>
                </button>
                <button class="category-btn" data-category="cloud" onclick="filterByCategory('cloud')">
                    <i class="fas fa-cloud"></i> Cloud
                    <span class="filter-count" id="count-cloud">0</span>
                </button>
                <button class="category-btn" data-category="database" onclick="filterByCategory('database')">
                    <i class="fas fa-database"></i> Database
                    <span class="filter-count" id="count-database">0</span>
                </button>
                <button class="category-btn" data-category="language" onclick="filterByCategory('language')">
                    <i class="fas fa-language"></i> Languages
                    <span class="filter-count" id="count-language">0</span>
                </button>
            </div>
            
            <!-- Results Info -->
            <div class="results-info">
                <span id="resultsCount"></span>
                <div class="view-options">
                    <button class="view-btn active" onclick="setView('grid')"><i class="fas fa-th-large"></i></button>
                    <button class="view-btn" onclick="setView('list')"><i class="fas fa-list"></i></button>
                </div>
            </div>
            
            <!-- Platforms Container -->
            <div id="platformsContainer"></div>
        </div>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/platforms.js"></script>
</body>
</html>
