    <div class="main-content">
        <div class="container">
            <h1 class="page-title">Connect With Me</h1>
            
            <div class="contact-grid">
                <div class="contact-card">
                    <i class="fas fa-envelope"></i>
                    <h3>Email</h3>
                    <p>wayne.mm.92@gmail.com</p>
                    <button class="btn" onclick="copyToClipboard('wayne.mm.92@gmail.com')">Copy Email</button>
                </div>
                
                <div class="contact-card">
                    <i class="fas fa-phone-alt"></i>
                    <h3>Phone</h3>
                    <p>09677740154</p>
                    <button class="btn" onclick="copyToClipboard('09677740154')">Copy Number</button>
                </div>
                
                <div class="contact-card">
                    <i class="fab fa-tiktok"></i>
                    <h3>TikTok</h3>
                    <p>@amkyaw.dev</p>
                    <a href="https://tiktok.com/@amkyaw.dev" target="_blank" class="btn">Follow Me</a>
                </div>
                
                <div class="contact-card">
                    <i class="fab fa-github"></i>
                    <h3>GitHub</h3>
                    <p>@amkyawdev</p>
                    <a href="https://github.com/amkyawdev" target="_blank" class="btn">View Profile</a>
                </div>
            </div>
            
            <div class="contact-form-card">
                <h3>Send a Message</h3>
                <form id="contactForm">
                    <div class="form-group">
                        <label>Your Name</label>
                        <input type="text" id="contactName" required>
                    </div>
                    <div class="form-group">
                        <label>Your Email</label>
                        <input type="email" id="contactEmail" required>
                    </div>
                    <div class="form-group">
                        <label>Message</label>
                        <textarea id="contactMessage" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn">Send Message</button>
                </form>
            </div>
        </div>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
